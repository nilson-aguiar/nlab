apiVersion: v1
kind: ConfigMap
metadata:
  name: helmfile-cmp-plugin
  namespace: argocd
data:
  plugin.yaml: |
    apiVersion: argoproj.io/v1alpha1
    kind: ConfigManagementPlugin
    metadata:
      name: helmfile
    spec:
      init:
        command: [sh, -c]
        args:
          - |
            if [ -f .sops.yaml ]; then
              export SOPS_AGE_KEY_FILE=/home/argocd/.config/sops/age/keys.txt
            fi
            # Remove any corrupt plugin directories (missing plugin.yaml)
            for dir in /home/argocd/helm/data/plugins/*; do
              if [ -d "$dir" ] && [ ! -f "$dir/plugin.yaml" ]; then
                rm -rf "$dir"
              fi
            done
            # Uncomment line below in case a plugin has been updated an it's failing to install it
            # for plugin in $(helm plugin list | awk 'NR>1 {print $1}'); do helm plugin uninstall "$plugin" || true; done
            helm repo update || true
            helmfile init
      generate:
        command: [sh, -c]
        args:
          - |
            if [ -f .sops.yaml ]; then
              export SOPS_AGE_KEY_FILE=/home/argocd/.config/sops/age/keys.txt
            fi
            helmfile template --include-crds
      discover:
        fileName: "helmfile.yaml"
