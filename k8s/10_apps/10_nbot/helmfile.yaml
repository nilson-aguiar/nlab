# k8s/10_apps/10_nbot/helmfile.yaml
repositories:
  - name: bjw-s
    url: ghcr.io/bjw-s-labs/helm
    oci: true

---
templates:
  bjw: &bjw
    namespace: nbot
    chart: bjw-s/app-template
    version: 4.6.2

releases:
  - name: nbot
    <<: *bjw
    secrets:
      - ./secrets/nbot.secrets.yaml
    values:
      - ./values/nbot.values.yaml
