---
apiVersion: v1
kind: Service
metadata:
  name: home-assistant
spec:
  type: ClusterIP
  selector:
    app: home-assistant
    role: server
  ports:
    - port: 8123
      targetPort: http
      protocol: TCP
      name: http
    - port: 8443
      targetPort: code-server
      protocol: TCP
      name: code-server