---
apiVersion: v1
kind: Service
metadata:
  name: matter-server
spec:
  type: ClusterIP
  ports:
    - port: 5580
      targetPort: matter-server
      protocol: TCP
      name: matter-server
    - port: 5540
      targetPort: matter-udp
      protocol: UDP
      name: matter-udp
  selector:
    app: matter-server
