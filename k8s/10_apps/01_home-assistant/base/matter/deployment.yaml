---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: matter-server
  name: matter-server
spec:
  revisionHistoryLimit: 3
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: matter-server
  template:
    metadata:
      labels:
        app: matter-server
    spec:
      # matter-server must run on the host network.
      # If placed behind the lan-bridge MACVLAN, the container's network namespace fails
      # to reliably process IPv6 Router Advertisements (RAs) from the Thread Border Router.
      # This results in "Network is unreachable" errors when trying to reach Thread ULAs.
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
        - name: matter-server
          image: "ghcr.io/home-assistant-libs/python-matter-server:tag-here"
          imagePullPolicy: IfNotPresent
          securityContext:
            privileged: true
          envFrom:
            - configMapRef:
                name: home-assistant-env
          ports:
            - name: matter-server
              containerPort: 5580
              protocol: TCP
            - name: matter-udp
              containerPort: 5540
              protocol: UDP
          resources:
            requests:
              memory: "128Mi"
            limits:
              memory: "512Mi"
          volumeMounts:
            - mountPath: /data
              name: matter-data
            - mountPath: /run/dbus
              name: d-bus
              readOnly: true
      restartPolicy: Always
      volumes:
        - name: matter-data
          persistentVolumeClaim:
            claimName: matter-server-data
        - name: d-bus
          hostPath:
            path: /run/dbus
