---
apiVersion: v1
kind: Service
metadata:
  name: home-assistant
spec:
  type: ClusterIP
  ports:
    - port: 8123
      targetPort: http
      protocol: TCP
      name: http
    - port: 8443
      targetPort: code-server
      protocol: TCP
      name: code-server
    - port: 5580
      targetPort: matter-server
      protocol: TCP
      name: matter-server
    - port: 5540
      targetPort: matter-udp
      protocol: UDP
      name: matter-udp