# Board: M5Stack CoreS3 (M5Stack)
# Definition: definitions/boards/m5stack-cores3/manifest.yaml

substitutions:
  friendly_name: Stackchan

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  project:
    name: m5stack.stackchan-bsp
    version: 2026.3.0

# Import the official Stack-chan BSP from M5Stack
packages:
  remote_package_files:
    url: https://github.com/m5stack/esphome-yaml
    files: [examples/kit/stackchan-bsp.factory.yaml]
    ref: main
    refresh: 0s

api:
  encryption:
    key: !secret stackchan__encryption_key
  on_client_connected:
    - delay: 50ms
    - micro_wake_word.start:
  on_client_disconnected:
    - voice_assistant.stop:

ota:
  - id: !extend ota_esphome
    password: !secret stackchan__ota_password

# Network & API setup (uses secrets.yaml from your ESPHome Dashboard)
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: Stackchan Fallback Hotspot
    password: !secret stackchan__encryption_key

# --- Custom Stack-chan Interactive Code ---

globals:
  - id: eye_x
    type: int
    initial_value: "0"
  - id: eye_y
    type: int
    initial_value: "0"
  - id: is_blinking
    type: bool
    initial_value: "false"
  - id: face_state
    type: int
    initial_value: "0" # 0=Idle, 1=Listening, 2=Thinking, 3=Speaking

# Voice assistant pipeline integration
# On-device wake word detection
micro_wake_word:
  id: mww
  microphone:
    microphone: i2s_mic
  models:
    - model: "https://github.com/esphome/micro-wake-word-models/raw/main/models/v2/hey_jarvis.json"
  # Wake word detected -> launch the voice assistant pipeline.
  # Without this trigger nothing starts the conversation.
  on_wake_word_detected:
    - voice_assistant.start:
        wake_word: !lambda return wake_word;

voice_assistant:
  id: va
  microphone:
    microphone: i2s_mic
  # Use the media player the BSP already wraps around i2s_speaker
  # (speaker: and media_player: are mutually exclusive).
  media_player: va_media_player
  micro_wake_word: mww
  on_listening:
    - lambda: 'id(face_state) = 1;'
    # Turn light bar blue
    - light.turn_on:
        id: stackchan_light_bar
        red: 0%
        green: 0%
        blue: 100%
        brightness: 80%
    # Sweep head left and right to "look" for the speaker
    - number.set:
        id: servo_x_angle
        value: 35
    - delay: 350ms
    - number.set:
        id: servo_x_angle
        value: -35
    - delay: 450ms
    - number.set:
        id: servo_x_angle
        value: 0
  on_stt_vad_end:
    - lambda: 'id(face_state) = 2;'
    # Turn light bar yellow while thinking
    - light.turn_on:
        id: stackchan_light_bar
        red: 100%
        green: 80%
        blue: 0%
  on_tts_start:
    - lambda: 'id(face_state) = 3;'
    # Turn light bar green while speaking
    - light.turn_on:
        id: stackchan_light_bar
        red: 0%
        green: 100%
        blue: 0%
  on_end:
    - lambda: 'id(face_state) = 0;'
    # Turn off the light bar
    - light.turn_off: stackchan_light_bar
    # Reset head position to center when conversation ends
    - number.set:
        id: servo_x_angle
        value: 0
    - number.set:
        id: servo_y_angle
        value: 0
    # Give the speaker time to release the shared I2S bus before re-arming the
    # mic; otherwise micro_wake_word can silently fail to restart after TTS.
    - delay: 1s
    - micro_wake_word.start:
  # If the pipeline errors (e.g. TTS/playback failure) reset state and resume
  # listening, so the robot never gets stuck and stops answering the wake word.
  on_error:
    - lambda: 'id(face_state) = 0;'
    - light.turn_off: stackchan_light_bar
    - delay: 1s
    - micro_wake_word.start:

# Interval to trigger random blinks and eye shifts
interval:
  - interval: 100ms
    then:
      - lambda: |-
          static int blink_counter = 0;
          static int move_counter = 0;
          static int mouth_counter = 0;

          // Handle Blinking (only during idle)
          if (id(face_state) == 0) {
            if (id(is_blinking)) {
              blink_counter++;
              if (blink_counter > 2) {
                id(is_blinking) = false;
                blink_counter = 0;
              }
            } else if (random_float() < 0.03) {
              id(is_blinking) = true;
              blink_counter = 0;
            }
          }

          // Handle Looking Around (only during idle)
          if (id(face_state) == 0) {
            move_counter++;
            if (move_counter > 30) {
              move_counter = 0;
              float r = random_float();
              if (r < 0.5) { id(eye_x) = 0; id(eye_y) = 0; } // center
              else if (r < 0.65) { id(eye_x) = -12; id(eye_y) = 0; } // left
              else if (r < 0.8) { id(eye_x) = 12; id(eye_y) = 0; } // right
              else if (r < 0.9) { id(eye_x) = 0; id(eye_y) = -8; } // up
              else { id(eye_x) = 0; id(eye_y) = 8; } // down
            }
          }

# Override display to clear test card and draw the custom face
display:
  - id: !extend m5cores3_lcd
    show_test_card: false
    lambda: |-
      // Fill background (black: 0, 0, 0)
      it.fill(Color(0, 0, 0));

      int centerX = 160;
      int centerY = 110;
      int eyeRadius = 32;
      int pupilRadius = 14;

      int leftEyeCenter = centerX - 60;
      int rightEyeCenter = centerX + 60;

      // 1. Draw Eyes based on Voice Assistant State
      if (id(face_state) == 1) {
        // LISTENING: Wide open eyes
        it.circle(leftEyeCenter, centerY, eyeRadius + 4, Color(255, 255, 255));
        it.circle(rightEyeCenter, centerY, eyeRadius + 4, Color(255, 255, 255));
        it.filled_circle(leftEyeCenter, centerY, pupilRadius - 2, Color(255, 255, 255));
        it.filled_circle(rightEyeCenter, centerY, pupilRadius - 2, Color(255, 255, 255));
      } 
      else if (id(face_state) == 2) {
        // THINKING: Tilted processing lines (confused/computing)
        it.line(leftEyeCenter - 25, centerY - 5, leftEyeCenter + 25, centerY + 5, Color(255, 255, 255));
        it.line(rightEyeCenter - 25, centerY + 5, rightEyeCenter + 25, centerY - 5, Color(255, 255, 255));
      } 
      else if (id(is_blinking) && id(face_state) == 0) {
        // BLINKING (Idle): Closed eye lines
        it.line(leftEyeCenter - 25, centerY, leftEyeCenter + 25, centerY, Color(255, 255, 255));
        it.line(rightEyeCenter - 25, centerY, rightEyeCenter + 25, centerY, Color(255, 255, 255));
      } 
      else {
        // IDLE or SPEAKING: Normal eyes with movement offset
        it.circle(leftEyeCenter, centerY, eyeRadius, Color(255, 255, 255));
        it.circle(rightEyeCenter, centerY, eyeRadius, Color(255, 255, 255));
        it.filled_circle(leftEyeCenter + id(eye_x), centerY + id(eye_y), pupilRadius, Color(255, 255, 255));
        it.filled_circle(rightEyeCenter + id(eye_x), centerY + id(eye_y), pupilRadius, Color(255, 255, 255));
      }

      // 2. Draw Mouth based on Voice Assistant State
      if (id(face_state) == 3) {
        // SPEAKING: Animating mouth
        static int mouth_radius = 4;
        static bool mouth_opening = true;
        if (mouth_opening) {
          mouth_radius += 2;
          if (mouth_radius >= 14) mouth_opening = false;
        } else {
          mouth_radius -= 2;
          if (mouth_radius <= 4) mouth_opening = true;
        }
        it.filled_circle(centerX, centerY + 55, mouth_radius, Color(255, 255, 255));
      } 
      else if (id(face_state) == 1) {
        // LISTENING: Small open circle (O mouth)
        it.circle(centerX, centerY + 55, 8, Color(255, 255, 255));
      } 
      else if (id(face_state) == 2) {
        // THINKING: Small straight line
        it.line(centerX - 10, centerY + 55, centerX + 10, centerY + 55, Color(255, 255, 255));
      } 
      else {
        // IDLE: Happy smile curve
        it.line(centerX - 15, centerY + 52, centerX + 15, centerY + 52, Color(255, 255, 255));
        it.line(centerX - 15, centerY + 52, centerX - 12, centerY + 49, Color(255, 255, 255));
        it.line(centerX + 15, centerY + 52, centerX + 12, centerY + 49, Color(255, 255, 255));
      }
