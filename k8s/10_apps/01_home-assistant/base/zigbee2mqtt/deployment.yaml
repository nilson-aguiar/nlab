---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zigbee2mqtt
  labels:
    app: zigbee2mqtt
spec:
  revisionHistoryLimit: 3
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: zigbee2mqtt
  template:
    metadata:
      annotations:
        k8s.v1.cni.cncf.io/networks: '[{
          "name": "lan-bridge",
          "namespace": "kube-system",
          "ips": ["192.168.1.233/24"]
        }]'
      labels:
        app: zigbee2mqtt
    spec:
      initContainers:
        - name: init-config
          image: busybox:1.38
          command:
            - sh
            - -c
            - |
              if [ ! -f /app/data/configuration.yaml ]; then
                echo "Initializing configuration.yaml..."
                cp /tmp/config/configuration.yaml /app/data/configuration.yaml
              fi
          volumeMounts:
            - name: zigbee2mqtt-data-volume
              mountPath: /app/data
            - name: zigbee2mqtt-config-volume
              mountPath: /tmp/config
      containers:
        - name: zigbee2mqtt
          image: "koenkk/zigbee2mqtt:tag-here"
          imagePullPolicy: IfNotPresent
          env:
            - name: TZ
              value: "Europe/Amsterdam"
            - name: ZIGBEE2MQTT_CONFIG_SERIAL_PORT
              value: "tcp://192.168.1.22:6638"
            - name: ZIGBEE2MQTT_CONFIG_SERIAL_ADAPTER
              value: "zstack"
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          resources:
            requests:
              memory: "128Mi"
            limits:
              memory: "512Mi"
          volumeMounts:
            - name: zigbee2mqtt-data-volume
              mountPath: /app/data
      restartPolicy: Always
      volumes:
        - name: zigbee2mqtt-config-volume
          configMap:
            name: zigbee2mqtt-config
        - name: zigbee2mqtt-data-volume
          persistentVolumeClaim:
            claimName: zigbee2mqtt-data
