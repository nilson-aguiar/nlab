repositories:
  - name: bjw-s
    url: https://bjw-s-labs.github.io/helm-charts

---

templates:
  bjw: &bjw
    namespace: affine
    chart: bjw-s/app-template
    version: 4.6.2

releases:

  # 2. Redis for Affine
  - name: affine-redis
    <<: *bjw
    values:
      - ./values/redis.values.yaml

  # 3. Affine Application
  - name: affine
    <<: *bjw
    secrets:
      - ./secrets/affine.values.secret.yaml
    values:
      - ./values/affine.values.yaml
