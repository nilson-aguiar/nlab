{{- if .Values.qbittorrent.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-qbittorrent
  labels:
    app: qbittorrent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: qbittorrent
  template:
    metadata:
      labels:
        app: qbittorrent
    spec:
      containers:
        {{- if .Values.gluetun.enabled }}
        - name: gluetun
          image: "{{ .Values.gluetun.image.repository }}:{{ .Values.gluetun.image.tag }}"
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
          env:
            - name: VPN_SERVICE_PROVIDER
              value: {{ .Values.gluetun.config.vpn_service_provider | quote }}
            - name: VPN_TYPE
              value: {{ .Values.gluetun.config.vpn_type | quote }}
            - name: SERVER_COUNTRIES
              value: {{ .Values.gluetun.config.server_countries | quote }}
          envFrom:
            - secretRef:
                name: {{ .Release.Name }}-vpn-secret
          volumeMounts:
            - name: tun
              mountPath: /dev/net/tun
        {{- end }}
        - name: qbittorrent
          image: "{{ .Values.qbittorrent.image.repository }}:{{ .Values.qbittorrent.image.tag }}"
          imagePullPolicy: {{ .Values.qbittorrent.image.pullPolicy }}
          ports:
            - name: webui
              containerPort: {{ .Values.qbittorrent.config.webui_port }}
            - name: bittorrent
              containerPort: {{ .Values.qbittorrent.config.bittorrent_port }}
              protocol: TCP
          env:
            - name: TZ
              value: {{ .Values.qbittorrent.config.timezone }}
            - name: WEBUI_PORT
              value: {{ .Values.qbittorrent.config.webui_port | quote }}
            - name: PUID
              value: {{ .Values.qbittorrent.config.puid | quote }}
            - name: PGID
              value: {{ .Values.qbittorrent.config.pgid | quote }}
            - name: UMASK
              value: {{ .Values.qbittorrent.config.umask | quote }}
          volumeMounts:
            - name: games-storage
              mountPath: /downloads
            - name: qbittorrent-config
              mountPath: /config
          resources:
            {{- toYaml .Values.qbittorrent.resources | nindent 12 }}
      volumes:
        - name: tun
          hostPath:
            path: /dev/net/tun
        - name: games-storage
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-tinfoil-hat-pvc
        - name: qbittorrent-config
          {{- if .Values.qbittorrent.persistence.config.enabled }}
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-qbittorrent-config
          {{- else }}
          emptyDir: {}
          {{- end }}
{{- end }}
