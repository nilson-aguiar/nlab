controllers:
  seerr:
    replicas: 1
    pod:
      securityContext:
        runAsUser: 2000
        runAsGroup: 2000
        runAsNonRoot: true
        fsGroup: 2000
        fsGroupChangePolicy: OnRootMismatch

    initContainers:
      permissions-config:
        securityContext:
          runAsNonRoot: false
          runAsUser: 0
          runAsGroup: 0
          allowPrivilegeEscalation: true
        image:
          repository: busybox
          tag: latest
        command: [ "/bin/sh", "-c", "chown -R 2000:2000 /app/config" ]

    containers:
      seerr:
        image:
          repository: ghcr.io/seerr-team/seerr
          tag: v3.2.0
        env:
          LOG_LEVEL: info
          PORT: 5055
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            memory: 512Mi

service:
  seerr:
    controller: seerr
    ports:
      http:
        port: 5055

persistence:
  config:
    existingClaim: seerr
#    size: 100Mi
#    retain: true
#    accessMode: ReadWriteOnce
    globalMounts:
      - path: /app/config

ingress:
  seerr:
    className: traefik
    annotations:
      traefik.ingress.kubernetes.io/router.entrypoints: websecure
      traefik.ingress.kubernetes.io/router.tls: "true"
    hosts:
      - host: seerr.local.naguiar.dev
        paths:
          - path: /
            service:
              identifier: seerr
              port: http
      - host: seerr.naguiar.dev
        paths:
          - path: /
            service:
              identifier: seerr
              port: http
