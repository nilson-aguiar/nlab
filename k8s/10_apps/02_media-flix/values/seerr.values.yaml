controllers:
  seerr:
    strategy: Recreate
    replicas: 1
    pod:
      securityContext:
        runAsUser: 2000
        runAsGroup: 2000
        runAsNonRoot: true
        fsGroup: 2000
        fsGroupChangePolicy: OnRootMismatch

    initContainers:
      permissions-config:
        securityContext:
          runAsNonRoot: false
          runAsUser: 0
          runAsGroup: 0
          allowPrivilegeEscalation: true
        image:
          repository: busybox
          tag: latest
        command: [ "/bin/sh", "-c", "chown -R 2000:2000 /app/config" ]

    containers:
      seerr:
        image:
          repository: ghcr.io/seerr-team/seerr
          tag: v3.2.0
        env:
          LOG_LEVEL: info
          PORT: 5055
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            memory: 512Mi

service:
  seerr:
    controller: seerr
    ports:
      http:
        port: 5055

persistence:
  config:
    existingClaim: seerr
#    size: 100Mi
#    retain: true
#    accessMode: ReadWriteOnce
    globalMounts:
      - path: /app/config

rawResources:
  middleware:
    enabled: true
    apiVersion: traefik.io/v1alpha1
    kind: Middleware
    forceRename: seerr-default-headers
    spec:
      spec:
        headers:
          browserXssFilter: true
          contentTypeNosniff: true
          forceSTSHeader: true
          stsIncludeSubdomains: true
          stsPreload: true
          stsSeconds: 15552000
          referrerPolicy: no-referrer
          contentSecurityPolicy: "default-src 'none'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https:; style-src 'self' 'unsafe-inline' https:; img-src 'self' data: https:; font-src 'self' https: data:; connect-src 'self' https:; frame-src 'self' https:; media-src 'self' https:; object-src 'none'; frame-ancestors 'self'; base-uri 'self'; form-action 'self';"
          customFrameOptionsValue: SAMEORIGIN
          customRequestHeaders:
            X-Forwarded-Proto: https
  ingress-route:
    enabled: true
    apiVersion: traefik.io/v1alpha1
    kind: IngressRoute
    annotations:
      external-dns.alpha.kubernetes.io/target: 192.168.1.200
      kubernetes.io/ingress.class: traefik-external
    spec:
      spec:
        entryPoints:
          - websecure
        routes:
          - match: Host(`seerr.local.naguiar.dev`) || Host(`seerr.naguiar.dev`)
            kind: Rule
            middlewares:
              - name: seerr-default-headers
            services:
              - name: seerr
                port: http
        tls:
          secretName: certificate-tls
