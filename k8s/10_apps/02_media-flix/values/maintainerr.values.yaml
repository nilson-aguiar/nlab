controllers:
  maintainerr:
    replicas: 1
    pod:
      securityContext:
        runAsUser: 2000
        runAsGroup: 2000
        runAsNonRoot: true
        fsGroup: 2000
        fsGroupChangePolicy: OnRootMismatch

    initContainers:
      permissions-config:
        securityContext:
          runAsNonRoot: false
          runAsUser: 0
          runAsGroup: 0
          allowPrivilegeEscalation: true
        image:
          repository: busybox
          tag: latest
        command: ["/bin/sh", "-c", "chown -R 2000:2000 /opt/data"]

    containers:
      app:
        image:
          repository: ghcr.io/maintainerr/maintainerr
          tag: 3.8.0
        env:
          TZ: Europe/Amsterdam
        probes:
          liveness:
            enabled: true
          readiness:
            enabled: true
          startup:
            enabled: true
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
              - ALL
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            memory: 512Mi
        ports:
          - name: http
            containerPort: &port 8080

persistence:
  config:
    enabled: true
#    size: 100Mi
#    retain: true
#    accessMode: ReadWriteOnce
    existingClaim: maintainerr
    globalMounts:
      - path: /opt/data

service:
  app:
    controller: maintainerr
    ports:
      http:
        port: *port

rawResources:
  middleware:
    enabled: true
    apiVersion: traefik.io/v1alpha1
    kind: Middleware
    forceRename: maintainerr-default-headers
    spec:
      spec:
        headers:
          browserXssFilter: true
          contentTypeNosniff: true
          forceSTSHeader: true
          stsIncludeSubdomains: true
          stsPreload: true
          stsSeconds: 15552000
          referrerPolicy: no-referrer
          contentSecurityPolicy: "default-src 'none'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https:; style-src 'self' 'unsafe-inline' https:; img-src 'self' data: https:; font-src 'self' https: data:; connect-src 'self' https:; frame-src 'self' https:; media-src 'self' https:; object-src 'none'; frame-ancestors 'self'; base-uri 'self'; form-action 'self';"
          customFrameOptionsValue: SAMEORIGIN
          customRequestHeaders:
            X-Forwarded-Proto: https
  ingress-route:
    enabled: true
    apiVersion: traefik.io/v1alpha1
    kind: IngressRoute
    annotations:
      external-dns.alpha.kubernetes.io/target: 192.168.1.200
      kubernetes.io/ingress.class: traefik-external
    spec:
      spec:
        entryPoints:
          - websecure
        routes:
          - match: Host(`maintainerr.local.naguiar.dev`) || Host(`maintainerr.naguiar.dev`)
            kind: Rule
            middlewares:
              - name: maintainerr-default-headers
            services:
              - name: maintainerr
                port: *port
        tls:
          secretName: certificate-tls
