controllers:
  maintainerr:
    replicas: 1
    pod:
      securityContext:
        runAsUser: 2000
        runAsGroup: 2000
        runAsNonRoot: true
        fsGroup: 2000
        fsGroupChangePolicy: OnRootMismatch

    containers:
      app:
        image:
          repository: ghcr.io/jorenn92/maintainerr
          tag: latest
        env:
          TZ: Europe/Amsterdam
        probes:
          liveness:
            enabled: true
          readiness:
            enabled: true
          startup:
            enabled: true
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            memory: 512Mi
        ports:
          - name: http
            containerPort: 8080

persistence:
  config:
    enabled: true
    existingClaim: maintainerr-config
    globalMounts:
      - path: /opt/data

service:
  app:
    controller: maintainerr
    ports:
      http:
        port: 8080

rawResources:
  middleware:
    enabled: true
    apiVersion: traefik.io/v1alpha1
    kind: Middleware
    forceRename: maintainerr-default-headers
    spec:
      spec:
        headers:
          browserXssFilter: true
          contentTypeNosniff: true
          forceSTSHeader: true
          stsIncludeSubdomains: true
          stsPreload: true
          stsSeconds: 15552000
          referrerPolicy: no-referrer
  ingress-route:
    enabled: true
    apiVersion: traefik.io/v1alpha1
    kind: IngressRoute
    annotations:
      external-dns.alpha.kubernetes.io/target: 192.168.1.200
      kubernetes.io/ingress.class: traefik-external
    spec:
      spec:
        entryPoints:
          - websecure
        routes:
          - match: Host(`maintainerr.local.naguiar.dev`) || Host(`maintainerr.naguiar.dev`)
            kind: Rule
            middlewares:
              - name: maintainerr-default-headers
            services:
              - name: maintainerr
                port: 8080
        tls:
          secretName: certificate-tls
