repositories:
  - name: bjw-s
    url: ghcr.io/bjw-s-labs/helm
    oci: true

---

templates:
  bjw: &bjw
    namespace: vaultwarden
    chart: bjw-s/app-template
    version: 4.6.2

releases:
  - name: vaultwarden
    <<: *bjw
    secrets:
      - ./secrets/vaultwarden.values.secret.yaml
    values:
      - ./values/vaultwarden.values.yaml
